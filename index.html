<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
  <title>Todo Ilovasi</title>
</head>
<body>

  <div class="container">
    <h1>Todo ilovasi</h1>
    <p class="subtitle">Vazifalarni boshqarish (CRUD)</p>

    <div class="input-box">
      <input type="text" id="todoInput" placeholder="Yangi vazifa matnini kiriting..." />
      <button class="add-btn" onclick="addTodo()">Qo'shish</button>
      <button class="load-btn">Todolarni yuklash ↻</button>
    </div>

    <h2>Todolar ro'yxati</h2>

    <div class="info">
      ℹ Todolarni yuklash tugmasini bosing.
    </div>

    <div id="todoList"></div>

    <div class="footer">
      Jami: <span id="count">0</span> ta todo
    </div>
  </div>

    <script src="as.js"></script>

</body>
</html>
